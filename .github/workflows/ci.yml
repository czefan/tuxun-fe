name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 适配 package.json 中的 node >=20.19.0，且支持 pnpm v11+ 所需的 node:sqlite
          cache: pnpm # 自动开启 pnpm 缓存，大幅缩短 CI 执行耗时

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: |
          pnpm build:h5
          pnpm check

      - name: Build Weixin mini program
        if: github.event_name == 'pull_request'
        env:
          SKIP_OPEN_DEVTOOLS: 'true'
        run: pnpm build:mp:prod

      - name: Check Weixin package size
        if: github.event_name == 'pull_request'
        env:
          MP_SIZE_STRICT: 'true'
          MP_SINGLE_PACKAGE_LIMIT: '2097152'
        run: pnpm analyze:mp:size
